fragment HomepageParts on Homepage {
  __typename
  hero {
    __typename
    title
    subtitle
    videoUrl
  }
  intro {
    __typename
    kicker
    title
    body
  }
  selectedProjectSlugs
}

fragment ServicesParts on Services {
  __typename
  headline
  intro
  disciplines {
    __typename
    number
    label
    statement
    deliverables
  }
  process {
    __typename
    step
    title
    text
  }
}

fragment AboutParts on About {
  __typename
  headline
  intro
  positioning {
    __typename
    title
    text
  }
}

fragment TeamParts on Team {
  __typename
  members {
    __typename
    name
    title
    image
    shortBio
    fullBio
  }
}

fragment BlogParts on Blog {
  __typename
  published
  order
  title
  excerpt
  date
  category
  image
  readTime
  pullQuote
  contentImages
  body
}

fragment ProjectsParts on Projects {
  __typename
  title
  year
  role
  published
  order
  thumbnail
  heroImage
  body
}
